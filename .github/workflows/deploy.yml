name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 한 번에 하나의 배포만 실행 (진행 중인 배포는 끊지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (npm ci 아님): Vite 8/Rolldown 의 플랫폼별 네이티브 바이너리는
      # OS마다 다른 optional dependency 라, 단일 OS에서 만든 lockfile 로는
      # 다른 OS의 npm ci 가 실패한다. install 은 실행 OS에 맞는 바이너리를 받는다.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
